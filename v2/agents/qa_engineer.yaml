name: qa_engineer
role_summary: "Verifies the implementation against the PRD acceptance criteria"
max_attempts: 3
tool_budget: 80

model:
  provider: openrouter
  tier: medium
  temperature: 0.1

report_filename: qa-report.md
specs_report_path: specs/qa-report.md
default_next_agent: code_reviewer

context_files:
  - context/latest.md
  - specs/prd.md
  - specs/tech-design.md
  - specs/implementation-plan.md

output_files:
  - specs/qa-report.md
  - "runs/{run_id}/qa-report.md"
  - context/latest.md
  - context/progress.md

allowed_actions:
  - read_codebase_map
  - read_file
  - read_file_range
  - search_code
  - exec_command
  - create_qa_reports
  - create_test_files
  - patch_file
  - start_dev_server
  - http_endpoint_testing
  - browser_navigate
  - browser_screenshot
  - browser_click
  - browser_fill
  - browser_eval
  - browser_get_text
  - update_context

forbidden_actions:
  - modify_prd
  - modify_product_code
  - modify_tech_design
  - deploy
  - delete_files
  - change_product_scope
  - request_full_codebase_without_justification
